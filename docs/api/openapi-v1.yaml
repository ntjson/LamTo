components:
  schemas:
    Correction:
      type: object
      properties:
        id:
          type: integer
        status:
          type: string
        reason:
          type: string
      required:
      - id
      - reason
      - status
    Device:
      type: object
      properties:
        install_id:
          type: string
        platform:
          type: string
        active:
          type: boolean
      required:
      - active
      - install_id
      - platform
    DeviceRegisterRequest:
      type: object
      properties:
        install_id:
          type: string
          minLength: 1
          description: Stable per-install client UUID (spec 7.2).
          maxLength: 64
        fcm_token:
          type: string
          minLength: 1
          maxLength: 512
        platform:
          $ref: '#/components/schemas/PlatformEnum'
        app_version:
          type: string
          default: ''
          maxLength: 32
      required:
      - fcm_token
      - install_id
      - platform
    FundSummary:
      type: object
      properties:
        balance_vnd:
          type: integer
        period_days:
          type: integer
        period_inflows_vnd:
          type: integer
        period_outflows_vnd:
          type: integer
      required:
      - balance_vnd
      - period_days
      - period_inflows_vnd
      - period_outflows_vnd
    LedgerEntryDetail:
      type: object
      properties:
        id:
          type: integer
        contractor_name:
          type: string
        actual_cost_vnd:
          type: integer
        published_at:
          type: string
          format: date-time
        proposed_amount_vnd:
          type: integer
          nullable: true
        integrity_status:
          type: string
        payload: {}
        verification:
          allOf:
          - $ref: '#/components/schemas/Verification'
          nullable: true
        redacted_documents:
          type: array
          items:
            $ref: '#/components/schemas/RedactedDocument'
        corrections:
          type: array
          items:
            $ref: '#/components/schemas/Correction'
        proof:
          $ref: '#/components/schemas/Proof'
      required:
      - actual_cost_vnd
      - contractor_name
      - corrections
      - id
      - integrity_status
      - payload
      - proof
      - proposed_amount_vnd
      - published_at
      - redacted_documents
      - verification
    LedgerEntryList:
      type: object
      properties:
        id:
          type: integer
        contractor_name:
          type: string
        actual_cost_vnd:
          type: integer
        published_at:
          type: string
          format: date-time
        integrity_status:
          type: string
        evidence_level:
          type: string
          readOnly: true
      required:
      - actual_cost_vnd
      - contractor_name
      - evidence_level
      - id
      - integrity_status
      - published_at
    Location:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        parent_id:
          type: integer
          nullable: true
      required:
      - id
      - name
      - parent_id
    LoginRequest:
      type: object
      properties:
        identifier:
          type: string
          minLength: 1
          description: Email or Vietnamese phone number.
        password:
          type: string
          writeOnly: true
          minLength: 1
      required:
      - identifier
      - password
    LogoutInstallIdRequest:
      type: object
      description: Optional body field for logout Device deactivation (spec 7.2).
      properties:
        install_id:
          type: string
          description: Deactivate this install's FCM Device on logout (also accepted
            via X-Install-Id).
          maxLength: 64
    Me:
      type: object
      properties:
        display_name:
          type: string
        email:
          type: string
          format: email
        phone:
          type: string
          nullable: true
        occupancies:
          type: array
          items:
            $ref: '#/components/schemas/Occupancy'
        notification_preferences:
          type: array
          items:
            $ref: '#/components/schemas/NotificationPreference'
      required:
      - display_name
      - email
      - notification_preferences
      - occupancies
      - phone
    NotificationFeed:
      type: object
      properties:
        id:
          type: integer
        event_code:
          type: string
        subject:
          type: string
        body:
          type: string
        created_at:
          type: string
          format: date-time
        read_at:
          type: string
          format: date-time
          nullable: true
      required:
      - body
      - created_at
      - event_code
      - id
      - read_at
      - subject
    NotificationPreference:
      type: object
      properties:
        event_code:
          type: string
        email_enabled:
          type: boolean
        push_enabled:
          type: boolean
      required:
      - email_enabled
      - event_code
      - push_enabled
    NotificationPreferenceUpdateItemRequest:
      type: object
      description: One preference row for PATCH /me/notification-preferences.
      properties:
        event_code:
          type: string
          minLength: 1
          maxLength: 64
        email_enabled:
          type: boolean
        push_enabled:
          type: boolean
      required:
      - event_code
    Occupancy:
      type: object
      properties:
        id:
          type: integer
        unit_label:
          type: string
        building_name:
          type: string
      required:
      - building_name
      - id
      - unit_label
    PaginatedLedgerEntryListList:
      type: object
      required:
      - results
      properties:
        next:
          type: string
          nullable: true
          format: uri
          example: http://api.example.org/accounts/?cursor=cD00ODY%3D"
        previous:
          type: string
          nullable: true
          format: uri
          example: http://api.example.org/accounts/?cursor=cj0xJnA9NDg3
        results:
          type: array
          items:
            $ref: '#/components/schemas/LedgerEntryList'
    PaginatedNotificationFeedList:
      type: object
      required:
      - results
      properties:
        next:
          type: string
          nullable: true
          format: uri
          example: http://api.example.org/accounts/?cursor=cD00ODY%3D"
        previous:
          type: string
          nullable: true
          format: uri
          example: http://api.example.org/accounts/?cursor=cj0xJnA9NDg3
        results:
          type: array
          items:
            $ref: '#/components/schemas/NotificationFeed'
    PaginatedReportSummaryList:
      type: object
      required:
      - results
      properties:
        next:
          type: string
          nullable: true
          format: uri
          example: http://api.example.org/accounts/?cursor=cD00ODY%3D"
        previous:
          type: string
          nullable: true
          format: uri
          example: http://api.example.org/accounts/?cursor=cj0xJnA9NDg3
        results:
          type: array
          items:
            $ref: '#/components/schemas/ReportSummary'
    PatchedNotificationPreferenceUpdateRequest:
      type: object
      properties:
        preferences:
          type: array
          items:
            $ref: '#/components/schemas/NotificationPreferenceUpdateItemRequest'
    PlatformEnum:
      enum:
      - IOS
      - ANDROID
      type: string
      description: |-
        * `IOS` - IOS
        * `ANDROID` - ANDROID
    Problem:
      type: object
      description: |-
        RFC 9457 problem+json body with a LamTo stable machine ``code`` (spec 3.1).

        ``detail`` is developer English; the Flutter client owns Vietnamese UI copy
        keyed off ``code``. ``errors`` is present only for validation failures.
      properties:
        type:
          type: string
          description: Problem type URI reference; usually about:blank.
        title:
          type: string
          description: Short human-readable summary (HTTP status phrase).
        status:
          type: integer
          description: HTTP status code.
        code:
          type: string
          description: Stable machine code for client branching (e.g. validation_failed,
            authentication_failed, not_authenticated, permission_denied, not_found,
            occupancy_selection_required, throttled).
        detail:
          type: string
          description: Developer-English explanation; not shown raw to residents.
        errors:
          type: object
          additionalProperties: {}
          description: Per-field validation errors when code is validation_failed.
            Values are lists of {message, code} objects (may nest for non-field errors).
      required:
      - code
      - status
      - title
      - type
    Proof:
      type: object
      properties:
        evidence_level:
          type: string
        anchoring_backend:
          type: string
        payload_hash:
          type: string
        events:
          type: array
          items:
            $ref: '#/components/schemas/ProofEvent'
      required:
      - anchoring_backend
      - events
      - evidence_level
      - payload_hash
    ProofEvent:
      type: object
      properties:
        event_id:
          type: string
        event_type:
          type: integer
        status:
          type: string
        evidence_level:
          type: string
        transaction_hash:
          type: string
      required:
      - event_id
      - event_type
      - evidence_level
      - status
      - transaction_hash
    RedactedDocument:
      type: object
      properties:
        label:
          type: string
        filename:
          type: string
        sha256:
          type: string
        download_url:
          type: string
      required:
      - download_url
      - filename
      - label
      - sha256
    ReportCase:
      type: object
      properties:
        id:
          type: integer
        category:
          type: string
        urgency:
          type: string
        deadline_at:
          type: string
          format: date-time
        active:
          type: boolean
        work_orders:
          type: array
          items:
            $ref: '#/components/schemas/ReportWorkOrder'
      required:
      - active
      - category
      - deadline_at
      - id
      - urgency
      - work_orders
    ReportCreateRequest:
      type: object
      properties:
        client_ref:
          type: string
          format: uuid
          description: Client-generated UUID, unique per user (spec 3.5).
        text:
          type: string
          minLength: 1
          maxLength: 5000
        location_id:
          type: integer
          description: Active BuildingLocation id in the resolved occupancy building.
      required:
      - client_ref
      - location_id
      - text
    ReportDetail:
      type: object
      properties:
        id:
          type: integer
        text:
          type: string
        status:
          type: string
        location_path_snapshot:
          type: string
        unit_label:
          type: string
        created_at:
          type: string
          format: date-time
        triage_status:
          type: string
          nullable: true
        category:
          type: string
          nullable: true
        photos:
          type: array
          items:
            $ref: '#/components/schemas/ReportPhoto'
        cases:
          type: array
          items:
            $ref: '#/components/schemas/ReportCase'
      required:
      - cases
      - category
      - created_at
      - id
      - location_path_snapshot
      - photos
      - status
      - text
      - triage_status
      - unit_label
    ReportPhoto:
      type: object
      properties:
        id:
          type: integer
        filename:
          type: string
        sha256:
          type: string
        download_url:
          type: string
      required:
      - download_url
      - filename
      - id
      - sha256
    ReportPhotoUploadRequest:
      type: object
      properties:
        photo:
          type: string
          format: binary
          description: JPEG/PNG image; scanned by ClamAV before storage.
      required:
      - photo
    ReportSummary:
      type: object
      properties:
        id:
          type: integer
        text:
          type: string
        status:
          type: string
        location_path_snapshot:
          type: string
        created_at:
          type: string
          format: date-time
      required:
      - created_at
      - id
      - location_path_snapshot
      - status
      - text
    ReportWorkOrder:
      type: object
      properties:
        id:
          type: integer
        status:
          type: string
        deadline_at:
          type: string
          format: date-time
        completed_at:
          type: string
          format: date-time
          nullable: true
        accepted_at:
          type: string
          format: date-time
          nullable: true
        can_rate:
          type: boolean
      required:
      - accepted_at
      - can_rate
      - completed_at
      - deadline_at
      - id
      - status
    TokenResponse:
      type: object
      properties:
        token:
          type: string
        expiry:
          type: string
          format: date-time
      required:
      - expiry
      - token
    Verification:
      type: object
      properties:
        decision:
          type: string
        verified_by:
          type: string
        verified_at:
          type: string
          format: date-time
      required:
      - decision
      - verified_at
      - verified_by
    WorkRatingRequest:
      type: object
      properties:
        score:
          type: integer
          maximum: 5
          minimum: 1
        comment:
          type: string
          maxLength: 500
      required:
      - score
    WorkRatingResult:
      type: object
      properties:
        id:
          type: integer
        work_order_id:
          type: integer
        score:
          type: integer
      required:
      - id
      - score
      - work_order_id
  securitySchemes:
    knoxApiToken:
      type: apiKey
      in: header
      name: Authorization
      description: Token-based authentication with required prefix "Token"
