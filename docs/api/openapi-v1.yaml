openapi: 3.0.3
info:
  title: LamTo Resident API
  version: v1
paths:
  /api/v1/auth/login:
    post:
      operationId: auth_login_create
      tags:
      - auth
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/LoginRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/LoginRequest'
        required: true
      security:
      - {}
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TokenResponse'
          description: ''
        '400':
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/Problem'
          description: Validation failed (code=validation_failed).
        '401':
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/Problem'
          description: Authentication required or failed (code=not_authenticated or
            authentication_failed).
        '429':
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/Problem'
          description: Too many authentication attempts (code=throttled).
  /api/v1/auth/logout:
    post:
      operationId: auth_logout_create
      parameters:
      - in: header
        name: X-Install-Id
        schema:
          type: string
        description: Stable per-install client id. When present on logout, deactivates
          that install's FCM Device so push stops for the install. Also accepted as
          JSON body field install_id.
      tags:
      - auth
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LogoutInstallIdRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/LogoutInstallIdRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/LogoutInstallIdRequest'
      security:
      - knoxApiToken: []
      responses:
        '204':
          description: No response body
        '401':
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/Problem'
          description: Authentication required or failed (code=not_authenticated or
            authentication_failed).
  /api/v1/auth/logout-all:
    post:
      operationId: auth_logout_all_create
      description: |-
        Log the user out of all sessions
        I.E. deletes all auth tokens for the user
      tags:
      - auth
      security:
      - knoxApiToken: []
      responses:
        '204':
          description: No response body
        '401':
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/Problem'
          description: Authentication required or failed (code=not_authenticated or
            authentication_failed).
  /api/v1/devices:
    post:
      operationId: devices_create
      tags:
      - devices
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DeviceRegisterRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/DeviceRegisterRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/DeviceRegisterRequest'
        required: true
      security:
      - knoxApiToken: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Device'
          description: ''
        '400':
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/Problem'
          description: Validation failed (code=validation_failed).
        '401':
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/Problem'
          description: Authentication required or failed (code=not_authenticated or
            authentication_failed).
  /api/v1/devices/{install_id}:
    delete:
      operationId: devices_destroy
