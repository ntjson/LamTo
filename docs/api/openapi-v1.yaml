components:
  schemas:
    CaseRatingRequest:
      type: object
      properties:
        satisfied:
          type: boolean
        comment:
          type: string
          maxLength: 500
      required:
      - satisfied
    CaseRatingResult:
      type: object
      properties:
        id:
          type: integer
        case_id:
          type: integer
        satisfied:
          type: boolean
      required:
      - case_id
      - id
      - satisfied
    Device:
      type: object
      properties:
        install_id:
          type: string
        platform:
          type: string
        active:
          type: boolean
      required:
      - active
      - install_id
      - platform
    DeviceRegisterRequest:
      type: object
      properties:
        install_id:
          type: string
          minLength: 1
          description: Stable per-install client UUID (spec 7.2).
          maxLength: 64
        fcm_token:
          type: string
          minLength: 1
          maxLength: 512
        platform:
          $ref: '#/components/schemas/PlatformEnum'
        app_version:
          type: string
          default: ''
          maxLength: 32
      required:
      - fcm_token
      - install_id
      - platform
    DirectionEnum:
      enum:
      - ENTRY
      - EXIT
      type: string
      description: |-
        * `ENTRY` - ENTRY
        * `EXIT` - EXIT
    FaceEnrollment:
      type: object
      properties:
        status:
          type: string
        submitted_at:
          type: string
          format: date-time
        review_note:
          type: string
      required:
      - review_note
      - status
      - submitted_at
    FaceRecognizeRequest:
      type: object
      properties:
        photo:
          type: string
          format: binary
      required:
      - photo
    FaceUploadRequest:
      type: object
      properties:
        photo:
          type: string
          format: binary
      required:
      - photo
    FundSeries:
      type: object
      properties:
        range:
          type: string
        points:
          type: array
          items:
            $ref: '#/components/schemas/FundSeriesPoint'
      required:
      - points
      - range
    FundSeriesPoint:
      type: object
      properties:
        period_start:
          type: string
          format: date
        inflows_vnd:
          type: integer
        outflows_vnd:
          type: integer
          description: Outflow-type amounts are stored negative; this is <= 0.
        balance_vnd:
          type: integer
      required:
      - balance_vnd
      - inflows_vnd
      - outflows_vnd
      - period_start
    FundSummary:
      type: object
      properties:
        balance_vnd:
          type: integer
        period_days:
          type: integer
        period_inflows_vnd:
          type: integer
        period_outflows_vnd:
          type: integer
      required:
      - balance_vnd
      - period_days
      - period_inflows_vnd
      - period_outflows_vnd
    GateDevice:
      type: object
      properties:
        label:
          type: string
        direction:
          $ref: '#/components/schemas/DirectionEnum'
      required:
      - direction
      - label
    GateRegistrations:
      type: object
      properties:
        face:
          allOf:
          - $ref: '#/components/schemas/FaceEnrollment'
          nullable: true
        plates:
          type: array
          items:
            $ref: '#/components/schemas/VehiclePlate'
      required:
      - face
      - plates
    InfoReplyRequest:
      type: object
      properties:
        text:
          type: string
          minLength: 1
      required:
      - text
    InfoReplyResult:
      type: object
      properties:
        report_id:
          type: integer
        status:
          $ref: '#/components/schemas/StatusEnum'
      required:
      - report_id
      - status
    KindEnum:
      enum:
      - BEFORE
      - AFTER
      type: string
      description: |-
        * `BEFORE` - Before
        * `AFTER` - After
    LedgerDocument:
      type: object
      properties:
        label:
          type: string
        filename:
          type: string
        sha256:
          type: string
        download_url:
          type: string
      required:
      - download_url
      - filename
      - label
      - sha256
    LedgerEntryDetail:
      type: object
      properties:
        id:
          type: integer
        contractor_name:
          type: string
        actual_cost_vnd:
          type: integer
        published_at:
          type: string
          format: date-time
        proposed_amount_vnd:
          type: integer
          nullable: true
        integrity_status:
          type: string
        what_was_fixed:
          type: string
          description: Resident-visible narrative of work completed.
        why:
          type: string
          description: Resident-visible rationale (cause or purpose).
        payload: {}
        verification:
          allOf:
          - $ref: '#/components/schemas/Verification'
          nullable: true
        approvers:
          type: array
          items: {}
        corrections:
          type: array
          items: {}
        documents:
          type: array
          items:
            $ref: '#/components/schemas/LedgerDocument'
        proof:
          $ref: '#/components/schemas/Proof'
      required:
      - actual_cost_vnd
      - approvers
      - contractor_name
      - corrections
      - documents
      - id
      - integrity_status
      - payload
      - proof
      - proposed_amount_vnd
      - published_at
      - verification
      - what_was_fixed
      - why
    LedgerEntryList:
      type: object
      properties:
        id:
          type: integer
        contractor_name:
          type: string
        actual_cost_vnd:
          type: integer
        published_at:
          type: string
          format: date-time
        integrity_status:
          type: string
        evidence_level:
          type: string
          readOnly: true
      required:
      - actual_cost_vnd
      - contractor_name
      - evidence_level
      - id
      - integrity_status
      - published_at
    Location:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        parent_id:
          type: integer
          nullable: true
      required:
      - id
      - name
      - parent_id
    LoginRequest:
      type: object
      properties:
        identifier:
          type: string
          minLength: 1
          description: Email or Vietnamese phone number.
        password:
          type: string
          writeOnly: true
          minLength: 1
      required:
      - identifier
      - password
    LogoutInstallIdRequest:
      type: object
      description: Optional body field for logout Device deactivation (spec 7.2).
      properties:
        install_id:
          type: string
          description: Deactivate this install's FCM Device on logout (also accepted
            via X-Install-Id).
          maxLength: 64
    Me:
      type: object
      properties:
        display_name:
          type: string
        email:
          type: string
          format: email
        phone:
          type: string
          nullable: true
        occupancies:
          type: array
          items:
            $ref: '#/components/schemas/Occupancy'
        notification_preferences:
          type: array
          items:
            $ref: '#/components/schemas/NotificationPreference'
      required:
      - display_name
      - email
      - notification_preferences
      - occupancies
      - phone
    NotificationFeed:
      type: object
      properties:
        id:
          type: integer
        event_code:
          type: string
        event_key:
          type: string
          description: 'Deep-link reference ''{code}:{entity}:{id}'' (spec 6.3/7.4).
            Entity ids are resident-visible resources the API re-authorizes on fetch.
            Authorization-neutral and non-sensitive: codes/entity/ids only — no PII,
            bodies, or tokens.'
        subject:
          type: string
        body:
          type: string
        created_at:
          type: string
          format: date-time
        read_at:
          type: string
          format: date-time
          nullable: true
      required:
      - body
      - created_at
      - event_code
      - event_key
      - id
      - read_at
      - subject
    NotificationPreference:
      type: object
      properties:
        event_code:
          type: string
        email_enabled:
          type: boolean
        push_enabled:
          type: boolean
      required:
      - email_enabled
      - event_code
      - push_enabled
    NotificationPreferenceUpdateItemRequest:
      type: object
      description: One preference row for PATCH /me/notification-preferences.
      properties:
        event_code:
          type: string
          minLength: 1
          maxLength: 64
        email_enabled:
          type: boolean
        push_enabled:
          type: boolean
      required:
      - event_code
    Occupancy:
      type: object
      properties:
        id:
          type: integer
        unit_label:
          type: string
        building_name:
          type: string
      required:
      - building_name
      - id
      - unit_label
    PaginatedLedgerEntryListList:
      type: object
      required:
      - results
      properties:
        next:
          type: string
          nullable: true
          format: uri
          example: http://api.example.org/accounts/?cursor=cD00ODY%3D"
        previous:
          type: string
          nullable: true
          format: uri
          example: http://api.example.org/accounts/?cursor=cj0xJnA9NDg3
        results:
          type: array
          items:
            $ref: '#/components/schemas/LedgerEntryList'
    PaginatedNotificationFeedList:
      type: object
      required:
      - results
      properties:
        next:
          type: string
          nullable: true
          format: uri
          example: http://api.example.org/accounts/?cursor=cD00ODY%3D"
        previous:
          type: string
          nullable: true
          format: uri
          example: http://api.example.org/accounts/?cursor=cj0xJnA9NDg3
        results:
          type: array
          items:
            $ref: '#/components/schemas/NotificationFeed'
    PaginatedProposalList:
      type: object
      required:
      - results
      properties:
        next:
          type: string
          nullable: true
          format: uri
          example: http://api.example.org/accounts/?cursor=cD00ODY%3D"
        previous:
          type: string
          nullable: true
          format: uri
          example: http://api.example.org/accounts/?cursor=cj0xJnA9NDg3
        results:
          type: array
          items:
            $ref: '#/components/schemas/Proposal'
    PaginatedReportSummaryList:
      type: object
      required:
      - results
      properties:
        next:
          type: string
          nullable: true
          format: uri
          example: http://api.example.org/accounts/?cursor=cD00ODY%3D"
        previous:
          type: string
          nullable: true
          format: uri
          example: http://api.example.org/accounts/?cursor=cj0xJnA9NDg3
        results:
          type: array
          items:
            $ref: '#/components/schemas/ReportSummary'
    PatchedNotificationPreferenceUpdateRequest:
      type: object
      properties:
        preferences:
          type: array
          items:
            $ref: '#/components/schemas/NotificationPreferenceUpdateItemRequest'
    PlateCreateRequest:
      type: object
      properties:
        plate:
          type: string
          minLength: 1
          maxLength: 32
      required:
      - plate
    PlateRecognizeRequest:
      type: object
      properties:
        plate:
          type: string
          minLength: 1
          maxLength: 64
      required:
      - plate
    PlatformEnum:
      enum:
      - IOS
      - ANDROID
      type: string
      description: |-
        * `IOS` - IOS
        * `ANDROID` - ANDROID
    Problem:
      type: object
      description: |-
        RFC 9457 problem+json body with a LamTo stable machine ``code`` (spec 3.1).

        ``detail`` is developer English; the Flutter client owns Vietnamese UI copy
        keyed off ``code``. ``errors`` is present only for validation failures.
      properties:
        type:
          type: string
          description: Problem type URI reference; usually about:blank.
        title:
          type: string
          description: Short human-readable summary (HTTP status phrase).
        status:
          type: integer
          description: HTTP status code.
        code:
          type: string
          description: Stable machine code for client branching (e.g. validation_failed,
            authentication_failed, not_authenticated, permission_denied, not_found,
            occupancy_selection_required, throttled).
        detail:
          type: string
          description: Developer-English explanation; not shown raw to residents.
        errors:
          type: object
          additionalProperties: {}
          description: Per-field validation errors when code is validation_failed.
            Values are lists of {message, code} objects (may nest for non-field errors).
      required:
      - code
      - status
      - title
      - type
    Proof:
      type: object
      properties:
        evidence_level:
          type: string
        anchoring_backend:
          type: string
        payload_hash:
          type: string
        events:
          type: array
          items:
            $ref: '#/components/schemas/ProofEvent'
        proposal_version: {}
        settlement: {}
      required:
      - anchoring_backend
      - events
      - evidence_level
      - payload_hash
      - proposal_version
      - settlement
    ProofEvent:
      type: object
      properties:
        event_id:
          type: string
        event_type:
          type: integer
        status:
          type: string
        evidence_level:
          type: string
        transaction_hash:
          type: string
      required:
      - event_id
      - event_type
      - evidence_level
      - status
      - transaction_hash
    Proposal:
      type: object
      properties:
        id:
          type: integer
        case_id:
          type: integer
          nullable: true
        building_id:
          type: integer
        status:
          type: string
        completed_at:
          type: string
          format: date-time
          nullable: true
        closed_at:
          type: string
          format: date-time
          nullable: true
        purpose:
          type: string
        proposed_action:
          type: string
        amount_vnd:
          type: integer
        fund_code:
          type: string
        contractor_name:
          type: string
        expected_schedule:
          type: string
        versions:
          type: array
          items:
            $ref: '#/components/schemas/ProposalVersion'
          readOnly: true
        progress:
          type: array
          items:
            $ref: '#/components/schemas/ProposalProgress'
          readOnly: true
        settlement:
          allOf:
          - $ref: '#/components/schemas/ProposalSettlement'
          nullable: true
          readOnly: true
        can_rate:
          type: boolean
          readOnly: true
      required:
      - amount_vnd
      - building_id
      - can_rate
      - case_id
      - closed_at
      - completed_at
      - contractor_name
      - expected_schedule
      - fund_code
      - id
      - progress
      - proposed_action
      - purpose
      - settlement
      - status
      - versions
    ProposalProgress:
      type: object
      properties:
        id:
          type: integer
        cause:
          type: string
        result:
          type: string
        created_at:
          type: string
          format: date-time
      required:
      - cause
      - created_at
      - id
      - result
    ProposalRatingResult:
      type: object
      properties:
        id:
          type: integer
        proposal_id:
          type: integer
        satisfied:
          type: boolean
      required:
      - id
      - proposal_id
      - satisfied
    ProposalSettlement:
      type: object
      properties:
        amount_vnd:
          type: integer
        payee_name:
          type: string
        transfer_recorded_at:
          type: string
          format: date-time
        acknowledged_at:
          type: string
          format: date-time
          nullable: true
        settled_at:
          type: string
          format: date-time
          nullable: true
      required:
      - acknowledged_at
      - amount_vnd
      - payee_name
      - settled_at
      - transfer_recorded_at
    ProposalSupportingDocument:
      type: object
      properties:
        id:
          type: integer
        filename:
          type: string
        sha256:
          type: string
        download_url:
          type: string
      required:
      - download_url
      - filename
      - id
      - sha256
    ProposalVersion:
      type: object
      properties:
        number:
          type: integer
        published_at:
          type: string
          format: date-time
        evidence_level:
          type: string
        supporting_documents:
          type: array
          items:
            $ref: '#/components/schemas/ProposalSupportingDocument'
      required:
      - evidence_level
      - number
      - published_at
      - supporting_documents
    RecognitionOutcome:
      type: object
      properties:
        matched:
          type: boolean
        display_name:
          type: string
        unit_label:
          type: string
        direction:
          type: string
        score:
          type: number
          format: double
          nullable: true
      required:
      - direction
      - display_name
      - matched
      - score
      - unit_label
    ReportCase:
      type: object
      properties:
        id:
          type: integer
        category:
          type: string
        urgency:
          type: string
        deadline_at:
          type: string
          format: date-time
        active:
          type: boolean
        completed_at:
          type: string
          format: date-time
          nullable: true
        closed_at:
          type: string
          format: date-time
          nullable: true
        updates:
          type: array
          items:
            $ref: '#/components/schemas/ReportWorkUpdate'
        can_rate:
          type: boolean
      required:
      - active
      - can_rate
      - category
      - closed_at
      - completed_at
      - deadline_at
      - id
      - updates
      - urgency
    ReportCreateRequest:
      type: object
      properties:
        client_ref:
          type: string
          format: uuid
          description: Client-generated UUID, unique per user (spec 3.5).
        text:
          type: string
          minLength: 1
          maxLength: 5000
        is_private:
          type: boolean
          default: false
        location_id:
          type: integer
          description: Active BuildingLocation id in the resolved occupancy building.
      required:
      - client_ref
      - location_id
      - text
    ReportDetail:
      type: object
      properties:
        id:
          type: integer
        text:
          type: string
        status:
          $ref: '#/components/schemas/StatusEnum'
        declined_reason:
          type: string
          nullable: true
        is_private:
          type: boolean
        open_info_request:
          type: object
          additionalProperties: {}
          nullable: true
        location_path_snapshot:
          type: string
        unit_label:
          type: string
        created_at:
          type: string
          format: date-time
        triage_status:
          type: string
          nullable: true
        category:
          type: string
          nullable: true
        photos:
          type: array
          items:
            $ref: '#/components/schemas/ReportPhoto'
        cases:
          type: array
          items:
            $ref: '#/components/schemas/ReportCase'
      required:
      - cases
      - category
      - created_at
      - declined_reason
      - id
      - is_private
      - location_path_snapshot
      - open_info_request
      - photos
      - status
      - text
      - triage_status
      - unit_label
    ReportPhoto:
      type: object
      properties:
        id:
          type: integer
        filename:
          type: string
        sha256:
          type: string
        download_url:
          type: string
      required:
      - download_url
      - filename
      - id
      - sha256
    ReportPhotoUploadRequest:
      type: object
      properties:
        photo:
          type: string
          format: binary
          description: JPEG/PNG image; scanned by ClamAV before storage.
      required:
      - photo
    ReportSummary:
      type: object
      properties:
        id:
          type: integer
        text:
          type: string
        status:
          $ref: '#/components/schemas/StatusEnum'
        is_private:
          type: boolean
        location_path_snapshot:
          type: string
        created_at:
          type: string
          format: date-time
      required:
      - created_at
      - id
      - is_private
      - location_path_snapshot
      - status
      - text
    ReportWorkUpdate:
      type: object
      properties:
        id:
          type: integer
        cause:
          type: string
        result:
          type: string
        created_at:
          type: string
          format: date-time
        photos:
          type: array
          items:
            $ref: '#/components/schemas/ReportWorkUpdatePhoto'
      required:
      - cause
      - created_at
      - id
      - photos
      - result
    ReportWorkUpdatePhoto:
      type: object
      properties:
        id:
          type: integer
        filename:
          type: string
        kind:
          $ref: '#/components/schemas/KindEnum'
        download_url:
          type: string
      required:
      - download_url
      - filename
      - id
      - kind
    StatusEnum:
      enum:
      - SUBMITTED
      - IN_REVIEW
      - NEEDS_INFO
      - DECLINED
      - IN_PROGRESS
      - PROPOSED
      - COMPLETED
      - CLOSED
      type: string
      description: |-
        * `SUBMITTED` - Submitted
        * `IN_REVIEW` - In review
        * `NEEDS_INFO` - Needs information
        * `DECLINED` - Declined
        * `IN_PROGRESS` - In progress
        * `PROPOSED` - Proposed
        * `COMPLETED` - Completed
        * `CLOSED` - Closed
    TokenResponse:
      type: object
      properties:
        token:
          type: string
        expiry:
          type: string
          format: date-time
      required:
      - expiry
      - token
    VehiclePlate:
      type: object
      properties:
        id:
          type: integer
        plate:
          type: string
        status:
          type: string
        submitted_at:
          type: string
          format: date-time
        review_note:
          type: string
      required:
      - id
      - plate
      - review_note
      - status
      - submitted_at
    Verification:
      type: object
      properties:
        decision:
          type: string
        verified_by:
          type: string
        verified_at:
          type: string
          format: date-time
      required:
      - decision
      - verified_at
      - verified_by
  securitySchemes:
    GateDevice:
      type: apiKey
      in: header
      name: Authorization
      description: GateDevice <credential>
    knoxApiToken:
      type: apiKey
      in: header
      name: Authorization
      description: Token-based authentication with required prefix "Token"
