{% load i18n %}
<span class="hash-value">
  <span class="sr-only">{{ label|default:_("Hash") }}: </span>
  <code class="hash" title="{{ label|default:_('Hash') }}">{{ value }}</code>
  <button type="button" class="button button-secondary button-compact" data-copy="{{ value }}" aria-label="{% blocktrans with l=label|default:_('hash') %}Copy {{ l }}{% endblocktrans %}">{% trans "Copy" %}</button>
</span>
