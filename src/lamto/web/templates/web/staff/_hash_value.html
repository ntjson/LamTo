<span class="hash-value">
  <span class="sr-only">{{ label|default:"Hash" }}: </span>
  <code class="hash" title="{{ label|default:'Hash' }}">{{ value }}</code>
  <button type="button" class="button button-secondary button-compact" data-copy="{{ value }}" aria-label="Copy {{ label|default:'hash' }}">Copy</button>
</span>
